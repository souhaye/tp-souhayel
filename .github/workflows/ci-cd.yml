name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Set up JDK 11
    uses: actions/setup-java@v3
    with:
      distribution: 'temurin'
      java-version: '11'
      cache: 'maven'

  - name: Build and Test Backend
    run: mvn clean verify -f ./springboot/app/pom.xml

  - name: Set up Node.js
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install Angular dependencies
    run: |
      cd angular-app
      npm install

  - name: Build Angular App
    run: |
      cd angular-app
      npm run build -- --output-path=dist

  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build Backend Image
    run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

  - name: Build Frontend Image
    run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

  - name: Push Backend Image
    run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

  - name: Push Frontend Image
    run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  - name: Run Docker Compose
    run: docker compose up -d

  - name: Wait
    run: sleep 20

  - name: Check Containers
    run: docker ps
```
