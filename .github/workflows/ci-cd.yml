name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Backend Setup - JDK 11 + Maven
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build Backend (Spring Boot)
        run: mvn clean package -f ./springboot/app/pom.xml

      # 3️⃣ Frontend Setup - Node.js + npm avec cache
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: angular-app/package-lock.json

      - name: Build Frontend (Angular)
        run: |
          cd angular-app
          npm install
          npm run build -- --output-path=dist

      # 4️⃣ Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Docker Build
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

      # 6️⃣ Docker Push
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # 7️⃣ Docker Compose
      - name: Run Docker Compose
        run: docker-compose up -d

      # 8️⃣ Wait & Check Containers
      - name: Wait
        run: sleep 30

      - name: Check Containers
        run: docker ps
