name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  # 1️⃣ Télécharger le projet depuis GitHub
  - name: Checkout code
    uses: actions/checkout@v3

  # 2️⃣ Installer Java 11 pour Spring Boot
  - name: Set up JDK 11
    uses: actions/setup-java@v3
    with:
      distribution: 'temurin'
      java-version: '11'
      cache: 'maven'

  # 3️⃣ Build + Tests Backend
  - name: Build and Test Backend (Spring Boot)
    run: mvn clean verify -f ./springboot/app/pom.xml

  # 4️⃣ Installer Node.js pour Angular
  - name: Set up Node.js
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  # 5️⃣ Installer dépendances Angular
  - name: Install Angular dependencies
    run: |
      cd angular-app
      npm install

  # 6️⃣ Build Angular
  - name: Build Angular App
    run: |
      cd angular-app
      npm run build -- --output-path=dist

  # 7️⃣ Login DockerHub
  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  # 8️⃣ Build Docker images
  - name: Build Backend Image
    run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

  - name: Build Frontend Image
    run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

  # 9️⃣ Push Docker images
  - name: Push Backend Image
    run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

  - name: Push Frontend Image
    run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  # 🔟 Lancer les containers
  - name: Run Docker Compose
    run: docker compose up -d

  # 1️⃣1️⃣ attendre un peu
  - name: Wait
    run: sleep 20

  # 1️⃣2️⃣ vérifier les containers
  - name: Check Containers
    run: docker ps
