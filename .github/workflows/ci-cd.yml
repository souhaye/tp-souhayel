name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Backend - JDK 11 + Maven
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build Backend
        run: mvn clean package -f ./springboot/app/pom.xml

      # 3️⃣ Frontend - Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: angular-app/package-lock.json

      - name: Build Frontend
        run: |
          cd angular-app
          npm install
          npm run build -- --output-path=dist

      # 4️⃣ Build Docker Images (LOCAL ONLY)
      - name: Build Backend Image
        run: docker build -t backend:latest ./springboot/app

      - name: Build Frontend Image
        run: docker build -t frontend:latest ./angular-app

      # 5️⃣ Run Docker Compose
      - name: Run Docker Compose
        run: docker compose up -d

      # 6️⃣ Wait & Verify
      - name: Wait
        run: sleep 30

      - name: Check Containers
        run: docker ps
